<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://noahsausen.github.io"/>
    <title>Noah Sausen</title>
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico"/>
    <style>
      body {
        background-color: hsl(0, 0%, 5%);
        font-family: sans-serif;
        margin: 0;
        padding: 0;
      }
      #content {
        box-sizing: border-box;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 1em;
        min-height: 100vh;
        width: 100%;
        color: hsl(0, 0%, 90%);
        margin: 0;
      }
      a {
        color: hsl(0, 0%, 90%);
      }
    </style>
    <script>
      window.location.replace("https://noahsausen.github.io");
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById("content").style.display = 'flex';
        }, 1000);
      });
    </script>
  </head>
  <body>
    <div id="content">
      <h1>Error 404: Page not found</h1>
      <p>You find yourself in a strange place. This link doesn't exist on my GitHub Pages and your browser ignored multiple redirect attempts...</p>
      <h1><a href="https://noahsausen.github.io">Return Home</a></h1>
    </div>
  </body>
</html>
